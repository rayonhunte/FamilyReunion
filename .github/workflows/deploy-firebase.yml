# Deploy to Firebase Hosting and Cloud Functions on push to main.
#
# Required secrets:
#   FIREBASE_TOKEN       - from: firebase login:ci
#   VITE_FIREBASE_*      - Firebase web app config (so the deployed app is not in demo mode)
#     VITE_FIREBASE_API_KEY, VITE_FIREBASE_AUTH_DOMAIN, VITE_FIREBASE_PROJECT_ID,
#     VITE_FIREBASE_STORAGE_BUCKET, VITE_FIREBASE_MESSAGING_SENDER_ID,
#     VITE_FIREBASE_APP_ID, VITE_FIREBASE_MEASUREMENT_ID
# Get the values from Firebase Console → Project settings → Your apps → Web app config.

name: Deploy to Firebase

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install root dependencies
        run: npm ci

      - name: Build app
        run: npm run build
        env:
          VITE_FIREBASE_API_KEY: ${{ secrets.VITE_FIREBASE_API_KEY }}
          VITE_FIREBASE_AUTH_DOMAIN: ${{ secrets.VITE_FIREBASE_AUTH_DOMAIN }}
          VITE_FIREBASE_PROJECT_ID: ${{ secrets.VITE_FIREBASE_PROJECT_ID }}
          VITE_FIREBASE_STORAGE_BUCKET: ${{ secrets.VITE_FIREBASE_STORAGE_BUCKET }}
          VITE_FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.VITE_FIREBASE_MESSAGING_SENDER_ID }}
          VITE_FIREBASE_APP_ID: ${{ secrets.VITE_FIREBASE_APP_ID }}
          VITE_FIREBASE_MEASUREMENT_ID: ${{ secrets.VITE_FIREBASE_MEASUREMENT_ID }}
          VITE_FUNCTIONS_URL: ${{ secrets.VITE_FUNCTIONS_URL || '/api' }}
          VITE_BOOTSTRAP_ADMIN_EMAIL: ${{ secrets.VITE_BOOTSTRAP_ADMIN_EMAIL || '' }}

      - name: Install functions dependencies
        run: npm ci --prefix functions

      - name: Build functions
        run: npm run build:functions

      - name: Deploy to Firebase
        run: npx firebase-tools deploy --only hosting,functions --non-interactive --token "${{ secrets.FIREBASE_TOKEN }}"
        env:
          CI: true
