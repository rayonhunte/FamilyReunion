# Deploy Firebase backend resources on push to main.
#
# Required secrets:
#   FIREBASE_TOKEN       - from: firebase login:ci

name: Deploy Firebase Backend

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install root dependencies
        run: npm ci

      - name: Install functions dependencies
        run: npm ci --prefix functions

      - name: Build functions
        run: npm run build:functions

      - name: Deploy Firebase backend
        run: npx firebase-tools deploy --only functions,firestore,storage --non-interactive --token "${{ secrets.FIREBASE_TOKEN }}"
        env:
          CI: true
